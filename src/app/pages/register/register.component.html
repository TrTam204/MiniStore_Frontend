<div class="login-wrapper">
	<div class="login-card register-card">
		<div class="login-header">
			<h1 class="logo-title">MiniStore</h1>
			<p class="login-subtitle">Tạo tài khoản để bắt đầu mua sắm</p>
		</div>

		<form class="login-form" [formGroup]="form" (ngSubmit)="register()">
			<div class="input-group">
				<label class="input-label">Họ tên</label>
				<div class="input-wrapper">
					<i class="pi pi-user"></i>
					<input pInputText type="text" formControlName="fullName" placeholder="Nhập họ tên" />
				</div>
			</div>

			<div class="input-group">
				<label class="input-label">Email</label>
				<div class="input-wrapper">
					<i class="pi pi-envelope"></i>
					<input pInputText type="email" formControlName="email" placeholder="Nhập email" />
				</div>
			</div>

			<div class="input-group">
				<label class="input-label">Mật khẩu</label>
				<div class="input-wrapper">
					<i class="pi pi-lock"></i>
					<input pInputText type="password" formControlName="password" placeholder="Nhập mật khẩu" />
				</div>
			</div>

			<div class="input-group">
				<label class="input-label">Xác nhận mật khẩu</label>
				<div class="input-wrapper">
					<i class="pi pi-lock"></i>
					<input pInputText type="password" formControlName="confirmPassword" placeholder="Nhập lại mật khẩu" />
				</div>
			</div>

			<div class="input-group">
				<label class="input-label">Số điện thoại</label>
				<div class="input-wrapper">
					<i class="pi pi-phone"></i>
					<input pInputText type="text" formControlName="phone" placeholder="Nhập số điện thoại" />
				</div>
			</div>

			<div class="input-group">
				<label class="input-label">Địa chỉ</label>
				<div class="input-wrapper">
					<i class="pi pi-map-marker"></i>
					<input pInputText type="text" formControlName="address" placeholder="Nhập địa chỉ" />
				</div>
			</div>

			<p-button label="Đăng ký" icon="pi pi-user-plus" styleClass="login-btn" type="submit"></p-button>
		</form>

		<div class="login-note">
			<p>Đã có tài khoản? <a routerLink="/login" class="register-link">Đăng nhập</a></p>
		</div>
	</div>
</div>
