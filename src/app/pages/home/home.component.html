<div class="home-container">
    <div class="top-wrapper">
        <div class="sidebar">
            <div class="sidebar-title">Danh mục</div>
            <div class="category-list">
        <div class="category-item" (click)="showAllProducts()">
            <i class="pi pi-th-large"></i>
            <span>Tất cả</span>
        </div>

        <div
            class="category-item"
            *ngFor="let category of categories"
            (click)="selectCategory(category.id)">
            <i class="pi pi-tag"></i>
            <span>{{ category.name }}</span>
        </div>
    </div>
        </div>
        <div class="hero-banner">
            <div class="hero-content">
                <div class="hero-title">XIN CHÀO</div>
                <div class="hero-subtitle">MiniStore Angular + ASP.NET Core</div>
            </div>
        </div>
    </div>
    <div class="product-section">
        <div class="product-section-title">SẢN PHẨM</div>
        <div class="product-list">
            <p-card
                *ngFor="let product of filteredProducts"
                class="product-card"
                (click)="goToDetail(product.id!)">
                <ng-template pTemplate="header">
                    <img
                        [src]="product.imageUrl"
                        [alt]="product.name"
                        class="product-image">
                </ng-template>
                <div class="product-content">
                    <div class="product-name"><strong>{{ product.name }}</strong></div>
                    <div class="product-price">{{ product.sellPrice | number }} VNĐ</div>
                    <div class="product-description" [title]="product.description">{{ product.description }}</div>
                    <p-button
                        label="Add To Cart"
                        icon="pi pi-shopping-cart"
                        (onClick)="addToCart(product, $event)">
                    </p-button>
                </div>
            </p-card>
        </div>
    </div>
</div>
