<div class="admin-orders">
  <p-toast></p-toast>
  <div class="page-header">
    <h2>Quản lý đơn hàng</h2>
  </div>

  <p-table [value]="orders" [paginator]="true" [rows]="10" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Mã đơn</th>
        <th>Ngày đặt</th>
        <th>Trạng thái</th>
        <th>Tổng tiền</th>
        <th>Hành động</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-order>
      <tr>
        <td>{{ order.orderId }}</td>
        <td>{{ order.orderDate | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <p-tag [value]="order.status" [severity]="getSeverity(order.status)"></p-tag>
        </td>
        <td>{{ order.totalPrice | number }} đ</td>
        <td>
            <p-dropdown
        [options]="statusOptions"
        [(ngModel)]="order.status"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn trạng thái"
        class="status-dropdown"
        appendTo="body"> </p-dropdown>
          <button pButton type="button" label="Cập nhật" icon="pi pi-refresh" class="update-button" (click)="updateStatus(order)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
