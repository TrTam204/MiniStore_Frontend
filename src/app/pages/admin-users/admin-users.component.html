    <div class="admin-container">
    <p-card styleClass="admin-card">
        <p-toolbar styleClass="admin-toolbar">
        <ng-template pTemplate="start">
            <div>
            <h2 class="page-title">Quản lý người dùng</h2>
            <p class="page-subtitle">Danh sách tài khoản trong hệ thống</p>
            </div>
        </ng-template>

            <ng-template pTemplate="end">
                <button
                    pButton
                    type="button"
                    label="Thêm người dùng"
                    icon="pi pi-plus"
                    severity="success"
                    routerLink="/admin/users/add">
                </button>
            </ng-template>
        </p-toolbar>

        <p-table
        [value]="users"
        [rows]="10"
        [paginator]="true"
        [rowsPerPageOptions]="[5, 10, 20]"
        [tableStyle]="{ 'width': '100%', 'table-layout': 'fixed' }"
        styleClass="user-table compact-table"
        stripedRows
        showGridlines>

        <ng-template pTemplate="header">
            <tr>
            <th style="width: 70px">ID</th>
            <th style="width: 150px">Họ tên</th>
            <th>Email</th>
            <th style="width: 140px">SĐT</th>
            <th>Địa chỉ</th>
            <th style="width: 110px">Role</th>
            <th style="width: 160px">Thao tác</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-user>
            <tr>
            <td>{{ user.id }}</td>

            <td class="user-name-cell" [title]="user.fullName">
                {{ user.fullName }}
            </td>

            <td class="email-cell" [title]="user.email">
                {{ user.email }}
            </td>

            <td>
                {{ user.phone }}
            </td>

            <td class="address-cell" [title]="user.address">
                {{ user.address }}
            </td>

            <td>
                <p-tag
                [value]="user.role"
                [severity]="getRoleSeverity(user.role)">
                </p-tag>
            </td>

            <td>
                <div class="table-actions">
                <button
                    pButton
                    type="button"
                    label="Sửa"
                    icon="pi pi-pencil"
                    severity="info"
                    size="small"
                    class="action-btn"
                    [routerLink]="['/admin/users/edit', user.id]">
                </button>

                <button
                    pButton
                    type="button"
                    label="Xóa"
                    icon="pi pi-trash"
                    severity="danger"
                    size="small"
                    class="action-btn"
                    (click)="deleteUser(user.id, user.email)">
                </button>
                </div>
            </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
            <td colspan="7" class="empty-message">
                Chưa có người dùng nào.
            </td>
            </tr>
        </ng-template>
        </p-table>
    </p-card>
    </div>
