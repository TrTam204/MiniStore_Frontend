<div class="card">
    <h2>Category Management</h2>
    <div class="button-navigation">
        <button routerLink="/category/add" pButton type="button" label="Add Category" icon="pi pi-plus" class="p-button-success add-category-btn"></button>
    </div>
    <p-table
        [value]="categories"
        [tableStyle]="{ 'min-width': '50rem' }"
        stripedRows
        showGridlines>

        <ng-template pTemplate="header">
            <tr>
                <th style="width: 100px">ID</th>
                <th>Name</th>
                <th style="width: 250px">Action</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-category>
            <tr>
                <td>{{ category.id }}</td>
                <td>{{ category.name }}</td>
                <td>
                <div class="action-buttons">
                    <button 
                        pButton 
                        type="button"
                        [routerLink]="['/category/edit', category.id]"
                        label="Edit" 
                        icon="pi pi-pencil"
                        class="p-button-info custom-edit-btn"></button>
                    <button 
                        pButton 
                        type="button"
                        (click)="deleteCategory(category.id, category.name)"
                        label="Delete" 
                        icon="pi pi-trash"
                        class="p-button-danger custom-delete-btn"></button>
                </div>
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
